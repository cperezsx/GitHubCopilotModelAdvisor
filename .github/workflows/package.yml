name: Package VSIX

on:
  workflow_dispatch:
  push:
    branches:
      - release/**

permissions:
  contents: read

jobs:
  package:
    name: Build VSIX
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run checks
        run: npm run check

      - name: Package extension
        run: npm run package

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: githubcopilotmodeladvisor-vsix
          path: "*.vsix"
          if-no-files-found: error
